<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sasha Math Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #fff);
            --tg-text: var(--tg-theme-text-color, #000);
            --tg-hint: var(--tg-theme-hint-color, #999);
            --tg-link: var(--tg-theme-link-color, #2481cc);
            --tg-btn: var(--tg-theme-button-color, #2481cc);
            --tg-btn-text: var(--tg-theme-button-text-color, #fff);
            --tg-secondary: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; padding-bottom: 75px;
            background-color: var(--tg-bg); color: var(--tg-text);
            display: flex; flex-direction: column; min-height: 100vh;
        }

        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Профиль */
        .profile-header { text-align: center; margin-bottom: 30px; padding-top: 10px; }
        .avatar-container { 
            width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 15px; 
            background: var(--tg-secondary); overflow: hidden; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-placeholder { 
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; 
            font-size: 36px; font-weight: bold; color: var(--tg-link); background: rgba(36,129,204,0.1);
        }
        .user-name { font-size: 22px; font-weight: 700; margin: 0; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--tg-secondary); border-radius: 16px; padding: 18px 10px; text-align: center; }
        .stat-val { font-size: 26px; font-weight: 800; color: var(--tg-link); margin-bottom: 6px; }
        .stat-label { font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }

        /* История баланса */
        .history-section { margin-top: 20px; }
        .history-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .history-list { list-style: none; padding: 0; margin: 0; background: var(--tg-secondary); border-radius: 16px; overflow: hidden; }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 14px 16px; border-bottom: 1px solid rgba(128,128,128,0.1); 
        }
        .history-item:last-child { border-bottom: none; }
        .hist-info { flex: 1; }
        .hist-reason { font-weight: 600; font-size: 14px; }
        .hist-date { font-size: 11px; color: var(--tg-hint); margin-top: 3px; }
        .hist-amount { font-weight: 800; font-size: 16px; }
        .hist-positive { color: #28a745; }
        .hist-negative { color: #dc3545; }

        /* Домашка */
        .dz-section { background: var(--tg-secondary); border-radius: 20px; padding: 25px; margin-top: 10px; }
        .dz-title { font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        
        .tabs-hw { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--tg-hint); font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--tg-link); border-bottom-color: var(--tg-link); }
        
        .hw-view { display: none; }
        .hw-view.active { display: block; }

        .input-group { display: flex; gap: 12px; margin-bottom: 15px; }
        input[type="number"] { 
            flex: 1; padding: 14px; border-radius: 12px; border: 1px solid rgba(128,128,128,0.2); 
            background: var(--tg-bg); color: var(--tg-text); font-size: 16px; outline: none;
        }
        button.primary { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            background: var(--tg-btn); color: var(--tg-btn-text); font-weight: 700; font-size: 15px; cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .dz-status { text-align: center; font-size: 13px; min-height: 20px; margin-top: 10px; font-weight: 500; }

        /* Загрузка файла (MULTI) */
        .file-upload-area { 
            border: 2px dashed rgba(128,128,128,0.3); border-radius: 12px; padding: 20px; 
            text-align: center; margin-bottom: 15px; cursor: pointer; transition: all 0.2s;
            background: var(--tg-bg);
        }
        .file-upload-area:hover { border-color: var(--tg-link); background: rgba(36,129,204,0.05); }
        .file-upload-area.has-file { border-color: #28a745; background: rgba(40,167,69,0.05); }
        #file-input { display: none; }
        .upload-icon { font-size: 40px; margin-bottom: 10px; }
        .upload-text { font-size: 14px; color: var(--tg-hint); }
        
        .file-list { margin-top: 10px; text-align: left; }
        .file-item { 
            background: rgba(0,0,0,0.05); padding: 8px 12px; border-radius: 8px; 
            margin-bottom: 5px; font-size: 13px; display: flex; justify-content: space-between;
        }

        /* Список моих работ */
        .my-hw-list { list-style: none; padding: 0; margin: 0; }
        .my-hw-item { 
            background: var(--tg-secondary); border-radius: 12px; padding: 15px; margin-bottom: 12px;
            border-left: 4px solid transparent;
        }
        .my-hw-item.status-pending { border-left-color: #ffc107; }
        .my-hw-item.status-approved { border-left-color: #28a745; }
        .my-hw-item.status-rejected { border-left-color: #dc3545; }
        
        .hw-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .hw-variant { font-weight: bold; font-size: 16px; }
        .hw-pages { font-size: 12px; color: var(--tg-hint); margin-left: 5px; }
        .hw-date { font-size: 11px; color: var(--tg-hint); }
        .hw-badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: bold; text-transform: uppercase; }
        .badge-pending { background: #fff3cd; color: #856404; }
        .badge-approved { background: #d4edda; color: #155724; }
        .badge-rejected { background: #f8d7da; color: #721c24; }
        
        .hw-comment { 
            margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.05); 
            border-radius: 8px; font-size: 13px; color: var(--tg-text);
        }
        .hw-comment.rejected { background: rgba(220, 53, 69, 0.1); color: #721c24; }

        /* Лидерборд */
        .leaderboard-list { list-style: none; padding: 0; margin: 0; background: var(--tg-secondary); border-radius: 16px; overflow: hidden; }
        .lb-item { 
            display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid rgba(128,128,128,0.1); 
        }
        .lb-item:last-child { border-bottom: none; }
        .lb-rank { width: 35px; font-weight: 800; color: var(--tg-hint); font-size: 16px; }
        .lb-name { flex: 1; font-weight: 600; font-size: 15px; }
        .lb-score { font-weight: 800; color: var(--tg-link); font-size: 16px; }
        .lb-me { background: rgba(36, 129, 204, 0.15); }

        /* Нижнее меню */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 65px; 
            background: var(--tg-bg); display: flex; border-top: 1px solid rgba(128,128,128,0.15);
            z-index: 100; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .nav-btn { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border: none; background: transparent; color: var(--tg-hint); font-size: 11px; cursor: pointer;
            transition: color 0.2s; padding: 8px 0;
        }
        .nav-btn.active { color: var(--tg-link); }
        .nav-icon { font-size: 22px; margin-bottom: 3px; }

        #debug { font-size: 10px; color: red; margin-top: 20px; white-space: pre-wrap; word-break: break-all; opacity: 0.7; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ПРОФИЛЬ -->
    <div id="screen-profile" class="screen active">
        <div class="profile-header">
            <div class="avatar-container" id="user-avatar-container"></div>
            <h2 class="user-name" id="user-name">Загрузка...</h2>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-val" id="val-rating">-</div><div class="stat-label">Рейтинг</div></div>
            <div class="stat-card"><div class="stat-val" id="val-huikons">-</div><div class="stat-label">Хуиконы</div></div>
            <div class="stat-card"><div class="stat-val" id="val-lives">-</div><div class="stat-label">Жизни</div></div>
        </div>

        <div class="history-section">
            <div class="history-title"> История изменений</div>
            <ul class="history-list" id="balance-history-list">
                <li style="text-align:center; padding:20px; opacity:0.5;">Загрузка...</li>
            </ul>
        </div>
    </div>

    <!-- ЭКРАН 2: ДОМАШКА -->
    <div id="screen-homework" class="screen">
        <div class="tabs-hw">
            <button class="tab-btn active" onclick="switchHwTab('upload')">📤 Сдать новое</button>
            <button class="tab-btn" onclick="switchHwTab('archive')">📂 Мои работы</button>
        </div>

        <!-- Вкладка загрузки -->
        <div id="hw-upload" class="hw-view active">
            <div class="dz-section">
                <div class="dz-title">Загрузить домашку</div>
                
                <div class="input-group">
                    <input type="number" id="dz-variant" placeholder="№ Варианта" min="1" inputmode="numeric">
                </div>

                <div class="file-upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">Нажми, чтобы выбрать фото (можно несколько)</div>
                    <div id="file-list" class="file-list"></div>
                </div>
                <input type="file" id="file-input" accept="image/*" multiple onchange="handleFileSelect(event)">

                <button class="primary" id="btn-upload-dz" onclick="uploadDZ()" disabled>Загрузить ДЗ</button>
                <div id="dz-status" class="dz-status"></div>
            </div>
            
            <div style="margin-top: 20px; text-align: center; opacity: 0.6; font-size: 13px;">
                Загрузка: +5 Хуиконов сразу<br>
                После проверки учителем: +10 Хуиконов
            </div>
        </div>

        <!-- Вкладка архива -->
        <div id="hw-archive" class="hw-view">
            <ul class="my-hw-list" id="my-hw-list">
                <li style="text-align:center; padding:20px; opacity:0.5;">Загрузка истории...</li>
            </ul>
        </div>
    </div>

    <!-- ЭКРАН 3: ЛИДЕРБОРД -->
    <div id="screen-leaderboard" class="screen">
        <h2 style="text-align: center; margin-bottom: 20px; font-size: 22px;">🏆 Топ учеников</h2>
        <ul class="leaderboard-list" id="lb-list">
            <li style="text-align: center; padding: 30px; opacity: 0.5;">Загрузка...</li>
        </ul>
    </div>

    <!-- НИЖНЕЕ МЕНЮ -->
    <div class="bottom-nav">
        <button class="nav-btn active" onclick="switchTab('profile')">
            <span class="nav-icon">👤</span> Профиль
        </button>
        <button class="nav-btn" onclick="switchTab('homework')">
            <span class="nav-icon"></span> Домашка
        </button>
        <button class="nav-btn" onclick="switchTab('leaderboard')">
            <span class="nav-icon">🏆</span> Лидеры
        </button>
    </div>

    <div id="debug"></div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const SUPABASE_URL = 'https://lchsrbwfmhblitxdmsfc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_rB0_CRkGuLwwyRenr8zHBA_Cf327mSZ';
        
        // Cloudinary Config
        const CLOUDINARY_CLOUD_NAME = 'ddrn3vxm0';
        const CLOUDINARY_UPLOAD_PRESET = 'sasha-math-dz'; 
        
        let currentUser = null;
        let db = null;
        let selectedFiles = []; // Теперь массив
        
        function log(msg) { console.log(msg); const d=document.getElementById('debug'); if(d) d.innerText += msg+'\n'; }

                document.addEventListener('DOMContentLoaded', async () => {
            const tg = window.Telegram.WebApp;
            tg.ready(); 
            tg.expand();

            db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            // ВРЕМЕННАЯ ОТЛАДКА: Выводим ВСЁ, что есть в initData
            console.log('--- DEBUG START ---');
            console.log('initData:', tg.initData);
            console.log('initDataUnsafe:', tg.initDataUnsafe);
            console.log('user from Unsafe:', tg.initDataUnsafe?.user);
            console.log('--- DEBUG END ---');

            const tgUser = tg.initDataUnsafe?.user;
            
            if (tgUser && tgUser.id) {
                currentUser = tgUser;
                log('✅ Данные получены от Telegram');
            } else {
                // Показываем в логах на экране, что именно пришло
                const debugInfo = JSON.stringify(tg.initDataUnsafe).substring(0, 100);
                log(`❌ Нет user. rawData: ${debugInfo}`);
                
                currentUser = null;
                document.getElementById('user-name').innerText = 'Ошибка доступа';
                document.getElementById('val-rating').innerText = '-';
                document.getElementById('val-huikons').innerText = '-';
                document.getElementById('val-lives').innerText = '-';
                return; 
            }

            document.getElementById('user-name').innerText = currentUser.first_name;
            setupAvatar(currentUser);
            await loadProfile();
        });

        function setupAvatar(user) {
            const container = document.getElementById('user-avatar-container');
            if (user.photo_url) {
                container.innerHTML = `<img src="${user.photo_url}" class="avatar-img">`;
            } else {
                const initial = user.first_name ? user.first_name[0].toUpperCase() : '?';
                container.innerHTML = `<div class="avatar-placeholder">${initial}</div>`;
            }
        }

        // --- ПРОФИЛЬ И ИСТОРИЯ ---
        async function loadProfile() {
            try {
                let { data, error } = await db.from('students').select('*').eq('telegram_id', currentUser.id).single();
                
                if (error && error.code === 'PGRST116') {
                    await db.from('students').insert([{ 
                        telegram_id: currentUser.id, name: currentUser.first_name, 
                        rating: 50, huikons: 0, lives: 3 
                    }]);
                    return loadProfile();
                } else if (error) { throw error; }
                
                document.getElementById('val-rating').innerText = data.rating;
                document.getElementById('val-huikons').innerText = data.huikons;
                document.getElementById('val-lives').innerText = '❤️'.repeat(data.lives);
                currentUser.stats = data;
                
                loadBalanceHistory();

            } catch (e) { log('❌ Ошибка профиля: ' + e.message); }
        }

        async function loadBalanceHistory() {
            const list = document.getElementById('balance-history-list');
            try {
                const { data, error } = await db
                    .from('balance_history')
                    .select('*')
                    .eq('student_id', currentUser.id)
                    .order('created_at', { ascending: false })
                    .limit(20);
                
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    list.innerHTML = '<li style="text-align:center; padding:20px; opacity:0.5;">История пуста</li>';
                    return;
                }
                
                list.innerHTML = '';
                data.forEach(item => {
                    const isPositive = item.change_amount > 0;
                    const reasonMap = {
                        'dz_upload': 'Загрузка ДЗ',
                        'dz_approved': 'ДЗ проверено ✅',
                        'dz_rejected': 'ДЗ возвращено ❌'
                    };
                    
                    const li = document.createElement('li');
                    li.className = 'history-item';
                    li.innerHTML = `
                        <div class="hist-info">
                            <div class="hist-reason">${reasonMap[item.reason] || item.reason}</div>
                            <div class="hist-date">${new Date(item.created_at).toLocaleDateString('ru-RU')}</div>
                        </div>
                        <div class="hist-amount ${isPositive ? 'hist-positive' : 'hist-negative'}">
                            ${isPositive ? '+' : ''}${item.change_amount}
                        </div>
                    `;
                    list.appendChild(li);
                });
                
            } catch (e) { 
                list.innerHTML = '<li style="text-align:center; color:red; padding:20px;">Ошибка загрузки истории</li>';
                log(e.message); 
            }
        }

        // --- ЗАГРУЗКА ФОТО И ДЗ (MULTI) ---
        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;
            
            selectedFiles = files;
            const area = document.getElementById('upload-area');
            const fileListDiv = document.getElementById('file-list');
            const btn = document.getElementById('btn-upload-dz');
            
            // Показываем список файлов
            fileListDiv.innerHTML = '';
            files.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `<span>${index + 1}. ${file.name}</span>`;
                fileListDiv.appendChild(div);
            });
            
            area.classList.add('has-file');
            area.querySelector('.upload-text').innerText = `Выбрано файлов: ${files.length}`;
            area.querySelector('.upload-icon').style.display = 'none';
            
            btn.disabled = false;
        }

        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            formData.append('folder', 'sasha-math-dz');
            
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            
            if (!res.ok) throw new Error('Ошибка загрузки в Cloudinary');
            const data = await res.json();
            return data.secure_url;
        }

        async function uploadDZ() {
            const btn = document.getElementById('btn-upload-dz');
            const variantInput = document.getElementById('dz-variant');
            const status = document.getElementById('dz-status');
            const variant = variantInput.value.trim();

            if (!variant) { status.innerText = "⚠️ Введите номер варианта!"; status.style.color = "#ff9800"; return; }
            if (selectedFiles.length === 0) { status.innerText = "⚠️ Выберите фото!"; status.style.color = "#ff9800"; return; }
            
            btn.disabled = true;
            status.innerText = `📤 Загрузка фото (0/${selectedFiles.length})...`; 
            status.style.color = "var(--tg-text)";

            try {
                // 1. Загружаем все фото в Cloudinary последовательно
                const photoUrls = [];
                for (let i = 0; i < selectedFiles.length; i++) {
                    status.innerText = `📤 Загрузка фото (${i + 1}/${selectedFiles.length})...`;
                    const url = await uploadToCloudinary(selectedFiles[i]);
                    photoUrls.push(url);
                }
                
                status.innerText = "💾 Сохранение в базу...";
                
                // 2. Сохраняем запись в Supabase (photo_url теперь JSON строка)
                const { error: dbError } = await db.from('homework_submissions').insert([{
                    student_id: currentUser.id,
                    variant_number: parseInt(variant),
                    photo_url: JSON.stringify(photoUrls), // Сохраняем массив как JSON
                    status: 'pending'
                }]);
                
                if (dbError) throw dbError;
                
                // 3. Начисляем бонус за загрузку
                await db.from('balance_history').insert([{
                    student_id: currentUser.id,
                    change_amount: 5,
                    reason: 'dz_upload'
                }]);
                
                await db.from('students').update({ 
                    huikons: (currentUser.stats?.huikons || 0) + 5 
                }).eq('telegram_id', currentUser.id);
                
                status.innerText = "✅ ДЗ загружено! Жди проверки учителя.";
                status.style.color = "#4caf50";
                
                // Сброс формы
                selectedFiles = [];
                variantInput.value = '';
                document.getElementById('file-list').innerHTML = '';
                document.getElementById('upload-area').classList.remove('has-file');
                document.getElementById('upload-area').querySelector('.upload-text').innerText = 'Нажми, чтобы выбрать фото (можно несколько)';
                document.getElementById('upload-area').querySelector('.upload-icon').style.display = 'block';
                
                await loadProfile();
                loadMyHomework(); // Обновляем архив

            } catch (e) {
                status.innerText = " Ошибка: " + e.message;
                status.style.color = "#f44336";
                log(e.message);
            } finally {
                btn.disabled = false;
            }
        }

        // --- МОИ РАБОТЫ (АРХИВ) ---
        async function loadMyHomework() {
            const list = document.getElementById('my-hw-list');
            try {
                const { data, error } = await db
                    .from('homework_submissions')
                    .select('*')
                    .eq('student_id', currentUser.id)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    list.innerHTML = '<li style="text-align:center; padding:20px; opacity:0.5;">Ты еще не сдавал ДЗ</li>';
                    return;
                }
                
                list.innerHTML = '';
                data.forEach(hw => {
                    const li = document.createElement('li');
                    li.className = `my-hw-item status-${hw.status}`;
                    
                    const date = new Date(hw.created_at).toLocaleDateString('ru-RU');
                    const statusText = hw.status === 'pending' ? 'На проверке' : 
                                     hw.status === 'approved' ? 'Принято' : 'Возврат';
                    const badgeClass = `badge-${hw.status}`;
                    
                    // Парсим фото для количества страниц
                    let pagesCount = 1;
                    try {
                        const photos = JSON.parse(hw.photo_url);
                        pagesCount = Array.isArray(photos) ? photos.length : 1;
                    } catch(e) {}
                    
                    let commentHtml = '';
                    if (hw.teacher_comment) {
                        const isRejected = hw.status === 'rejected';
                        commentHtml = `<div class="hw-comment ${isRejected ? 'rejected' : ''}">
                            💬 ${hw.teacher_comment}
                        </div>`;
                    }
                    
                    li.innerHTML = `
                        <div class="hw-header">
                            <div>
                                <div class="hw-variant">Вариант №${hw.variant_number} <span class="hw-pages">📄 x${pagesCount}</span></div>
                                <div class="hw-date">${date}</div>
                            </div>
                            <span class="hw-badge ${badgeClass}">${statusText}</span>
                        </div>
                        ${commentHtml}
                    `;
                    list.appendChild(li);
                });
                
            } catch (e) {
                list.innerHTML = '<li style="text-align:center; color:red; padding:20px;">Ошибка загрузки</li>';
                log(e.message);
            }
        }

        // --- ЛИДЕРБОРД ---
        async function loadLeaderboard() {
            const list = document.getElementById('lb-list');
            list.innerHTML = '<li style="text-align:center; padding:30px; opacity:0.5;">Загрузка...</li>';
            
            try {
                const { data, error } = await db
                    .from('students')
                    .select('name, rating, telegram_id')
                    .order('rating', { ascending: false })
                    .limit(10);
                
                if (error) throw error;
                list.innerHTML = '';
                
                data.forEach((student, index) => {
                    const isMe = student.telegram_id === currentUser.id;
                    const li = document.createElement('li');
                    li.className = `lb-item ${isMe ? 'lb-me' : ''}`;
                    
                    let rankDisplay = `#${index + 1}`;
                    if (index === 0) rankDisplay = '🥇';
                    if (index === 1) rankDisplay = '';
                    if (index === 2) rankDisplay = '🥉';

                    li.innerHTML = `
                        <div class="lb-rank">${rankDisplay}</div>
                        <div class="lb-name">${student.name} ${isMe ? '(Вы)' : ''}</div>
                        <div class="lb-score">${student.rating} ⭐</div>
                    `;
                    list.appendChild(li);
                });

            } catch (e) {
                list.innerHTML = '<li style="text-align:center; color:#f44336; padding:30px;">Ошибка</li>';
            }
        }

        // --- НАВИГАЦИЯ ---
        function switchTab(tabName) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));

            if (tabName === 'profile') {
                document.getElementById('screen-profile').classList.add('active');
                document.querySelectorAll('.nav-btn')[0].classList.add('active');
                loadProfile();
            } else if (tabName === 'homework') {
                document.getElementById('screen-homework').classList.add('active');
                document.querySelectorAll('.nav-btn')[1].classList.add('active');
                loadMyHomework();
            } else if (tabName === 'leaderboard') {
                document.getElementById('screen-leaderboard').classList.add('active');
                document.querySelectorAll('.nav-btn')[2].classList.add('active');
                loadLeaderboard();
            }
        }

        function switchHwTab(viewName) {
            document.querySelectorAll('.hw-view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            if (viewName === 'upload') {
                document.getElementById('hw-upload').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else {
                document.getElementById('hw-archive').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                loadMyHomework();
            }
        }
    </script>
</body>
</html>
